# @package _global_

# to execute this experiment run:
#   python src/train.py experiment=aacd_ct101

defaults:
  - override /model: aacd
  - override /data: kd_data
  - override /callbacks: default
  - override /trainer: ddp
  - override /data/attributes: 7_CALTECH101

tags: ["aacd", "CALTECH", "resnet18"]

seed: 42

trainer:
  max_epochs: 200

data:
  batch_size: 256

model:
  net:
    student:
      arch: resnet18
    dino:
      model_name: dinov2_vits14
    use_mobilevit: false
    shared_dim: 128
    agreement_alpha: 2.0
  kd_criterion:
    lambda_feat: 0.0
  cca_s: 128
