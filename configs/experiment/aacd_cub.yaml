# @package _global_

# to execute this experiment run:
#   python src/train.py experiment=aacd_cub
#
# to use ResNet-18 student instead of MobileViT:
#   python src/train.py experiment=aacd_cub model.net.use_mobilevit=false model.net.student.arch=resnet18

defaults:
  - override /model: aacd
  - override /data: kd_data
  - override /callbacks: default
  - override /trainer: ddp

tags: ["aacd", "cub200", "resnet18"]

seed: 42

trainer:
  max_epochs: 100

data:
  attributes:
    name: 0_CUB_200_2011
  batch_size: 256

model:
  net:
    student:
      arch: resnet18
    dino:
      model_name: dinov2_vits14
    shared_dim: 128
    kernel_name: poly
    text_kernel_name: cosine
    kernel_degree: 3
    text_preproc: raw
    use_ae_svc: true
  kd_criterion:
    lambda_cls: 1.0
    lambda_clip: 0.2
    lambda_dino: 0.6
    lambda_txt: 0.2
  use_ae_svc: true
  ae_svc_epochs: 50
