# @package _global_

# to execute this experiment run:
#   python src/train.py experiment=resnet_ct101_direct

defaults:
  - override /model: resnet_supervised
  - override /data: kd_data
  - override /callbacks: default
  - override /trainer: ddp
  - override /data/attributes: 7_CALTECH101

tags: ["ablation", "CALTECH", "resnet18", "direct"]

seed: 42

trainer:
  max_epochs: 200
  devices: [1, 2]

data:
  batch_size: 64

logger:
  wandb:
    name: "${data.data_name}_S(${model.net.student.arch})_direct_${model.use_teacher}"
