_target_: src.models.aacd_module.AACDModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.0001
  weight_decay: 0.01

scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  _partial_: true
  step_size: 30
  gamma: 0.5

# Shared logger config expects this flag to exist for all model variants.
# AACD always uses frozen teachers, so keep it enabled here.
use_teacher: true

# Whether to use AE-SVC preprocessing on teacher features.
use_ae_svc: true

# ---- Network ----------------------------------------------------------
net:
  _target_: src.models.components.aacd_campus.AACDTeacherStudent

  # CLIP teacher (same as VL2Lite baseline)
  teacher:
    arch: convnext_xxlarge
    pretrained: laion2b_s34b_b82k_augreg_soup

  # DINOv2 teacher
  # For fast debugging: dinov2_vits14 (384-dim)
  # For final results: dinov2_vitg14 (1536-dim)
  dino:
    model_name: dinov2_vits14

  # Student
  # MobileViT: mobilevit_s / mobilevit_xs / mobilevit_xxs
  # ResNet:    resnet18 (set use_mobilevit: false)
  student:
    arch: resnet18

  # Dataset attributes injected automatically
  data_attributes: ${data.train_dataset.attributes}

  # Shared projection dimensionality for kernel computation.
  shared_dim: 128

  # Kernel settings
  kernel_name: poly            # "poly" or "cosine"
  text_kernel_name: cosine     # kernel for text features
  kernel_degree: 3             # polynomial degree

  # Text preprocessing: "raw" (use frozen CLIP text features directly)
  # or "clip_ae" (pass through CLIP AE encoder first)
  text_preproc: raw

  # AE-SVC toggle (must match model-level use_ae_svc)
  use_ae_svc: true

  # Enable MobileViT student with patch aggregation + feature-wise distillation.
  # Set to false to fall back to ResNet student (original behaviour).
  use_mobilevit: false

# ---- AACD kernel loss -------------------------------------------------
kd_criterion:
  _target_: src.models.components.aacd_criterion.AACDKernelCriterion
  lambda_cls: 1.0
  lambda_clip: 0.2
  lambda_dino: 0.6
  lambda_txt: 0.2

# ---- AE-SVC settings (offline preprocessing) --------------------------
ae_svc_epochs: 50
ae_svc_lr: 0.001
ae_svc_batch_size: 256

# Directory for caching extracted teacher features across runs.
cache_dir: ".cache"

# compile model for faster training with pytorch 2.0
compile: false
