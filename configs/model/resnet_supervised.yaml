_target_: src.models.supervised_module.SupervisedClassificationModule

optimizer:
  _target_: torch.optim.AdamW
  _partial_: true
  lr: 0.0001
  weight_decay: 0.01

scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  _partial_: true
  step_size: 30
  gamma: 0.5

# Shared logger config expects this flag to exist for all model variants.
use_teacher: false

net:
  _target_: src.models.components.direct_resnet.DirectResNetClassifier
  student:
    arch: resnet18
  data_attributes: ${data.train_dataset.attributes}

# compile model for faster training with pytorch 2.0
compile: false
